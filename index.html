<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hội Khóa 40 Năm - Hai Bà Trưng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            /* Cho phép cuộn trang bình thường */
            touch-action: pan-y;
        }
        #canvas-container {
            box-shadow: 0 10px 20px -5px rgb(0 0 0 / 0.1);
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 16px 16px;
            background-color: #f1f5f9;
            cursor: move;
            position: relative;
            /* Chỉ chặn các hành vi mặc định khi thao tác trên canvas */
            touch-action: none;
        }
        .control-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }
        .control-btn:active {
            transform: scale(0.92);
            background-color: #e2e8f0;
        }
        .btn-primary:active {
            transform: scale(0.96);
            filter: brightness(0.9);
        }
        input[type=range] {
            height: 12px;
            -webkit-appearance: none;
            width: 100%;
            background: #e2e8f0;
            border-radius: 999px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            background: #4f46e5;
            cursor: pointer;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }

        /* Modal cho Mobile Download */
        #result-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(8px);
        }
        #result-modal.active {
            display: flex;
        }
        
        .result-box {
            animation: zoomIn 0.3s ease-out;
        }
        
        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="p-2 md:p-8 flex items-center justify-center min-h-screen">

    <div class="max-w-6xl w-full bg-white rounded-2xl md:rounded-3xl overflow-hidden shadow-2xl flex flex-col lg:flex-row border border-slate-100">
        
        <!-- Khu vực Preview -->
        <div class="flex-[1.2] bg-slate-50 p-4 md:p-10 flex flex-col items-center justify-center border-b lg:border-b-0 lg:border-r border-slate-200">
            <div class="flex items-center gap-2 mb-4 md:mb-6">
                <div class="w-2 h-2 md:w-3 h-3 rounded-full bg-red-400"></div>
                <div class="w-2 h-2 md:w-3 h-3 rounded-full bg-yellow-400"></div>
                <div class="w-2 h-2 md:w-3 h-3 rounded-full bg-green-400"></div>
                <h2 class="ml-2 text-[10px] md:text-sm font-bold uppercase tracking-widest text-slate-400">Xem trước Frame</h2>
            </div>
            
            <div id="canvas-container" class="relative rounded-lg md:rounded-xl overflow-hidden border-4 md:border-[12px] border-white shadow-inner">
                <canvas id="mainCanvas" width="800" height="800" class="max-w-full h-auto block"></canvas>
            </div>
            
            <div class="mt-4 flex items-center gap-3 text-slate-500 bg-white px-3 py-2 rounded-full shadow-sm border border-slate-100">
                <i class="fas fa-hand-pointer text-indigo-500 text-xs"></i>
                <span class="text-[10px] md:text-xs font-medium uppercase tracking-tight">Kéo để di chuyển • 2 ngón tay để thu phóng</span>
            </div>
        </div>

        <!-- Khu vực Tùy chỉnh -->
        <div class="flex-1 p-5 md:p-8 flex flex-col bg-white">
            <header class="mb-6 text-center lg:text-left">
                <h1 class="text-2xl md:text-3xl font-black text-slate-900 leading-tight">40 NĂM<br><span class="text-indigo-600 uppercase">Hai Bà Trưng</span></h1>
                <p class="text-slate-500 text-[10px] md:text-sm mt-1 font-medium italic uppercase tracking-tighter">Kỷ niệm 1986 - 2026</p>
            </header>

            <section class="space-y-3 mb-6">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">1. Hình ảnh của bạn</label>
                <button onclick="document.getElementById('user-photo').click()" class="btn-primary control-btn w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3.5 px-5 rounded-xl flex items-center justify-center gap-3 font-bold shadow-lg shadow-indigo-100">
                    <i class="fas fa-camera text-lg"></i>
                    <span class="text-sm">CHỌN ẢNH CÁ NHÂN</span>
                </button>
                <input type="file" id="user-photo" accept="image/*" class="hidden">
            </section>

            <section class="space-y-5 mb-6">
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">2. Phóng to / Thu nhỏ</label>
                        <span id="zoom-val" class="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded">100%</span>
                    </div>
                    <div class="px-1 py-2">
                        <input type="range" id="zoom-slider" min="0.05" max="3" step="0.01" value="1">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-3 text-center lg:text-left">3. Căn chỉnh chính xác</label>
                    <div class="flex justify-center">
                        <div class="grid grid-cols-3 gap-2">
                            <div></div>
                            <button id="move-up" class="control-btn w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center text-slate-600 shadow-sm"><i class="fas fa-chevron-up"></i></button>
                            <div></div>
                            <button id="move-left" class="control-btn w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center text-slate-600 shadow-sm"><i class="fas fa-chevron-left"></i></button>
                            <button id="reset-pos" class="control-btn w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center text-indigo-600 shadow-sm" title="Về trung tâm"><i class="fas fa-dot-circle"></i></button>
                            <button id="move-right" class="control-btn w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center text-slate-600 shadow-sm"><i class="fas fa-chevron-right"></i></button>
                            <div></div>
                            <button id="move-down" class="control-btn w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center text-slate-600 shadow-sm"><i class="fas fa-chevron-down"></i></button>
                            <div></div>
                        </div>
                    </div>
                </div>
            </section>

            <div class="mt-auto pt-4 border-t border-slate-100">
                <button id="download-btn" class="btn-primary control-btn w-full bg-emerald-500 hover:bg-emerald-600 text-white py-4 px-6 rounded-xl flex items-center justify-center gap-4 font-black text-lg shadow-xl shadow-emerald-100 uppercase tracking-tighter">
                    <i class="fas fa-magic"></i> XUẤT ẢNH NGAY
                </button>
                <div class="flex justify-center gap-4 mt-4 text-[9px] text-slate-400 uppercase tracking-widest font-bold">
                    Trường THPT Hai Bà Trưng - Huế
                </div>
            </div>
        </div>
    </div>

    <!-- Modal cho Mobile Download -->
    <div id="result-modal">
        <div class="result-box bg-white p-6 rounded-3xl w-full max-w-sm flex flex-col items-center shadow-2xl">
            <h3 class="text-slate-800 font-black mb-1 uppercase text-lg">Hoàn thành!</h3>
            <div class="bg-indigo-50 text-indigo-600 text-[10px] py-2 px-4 rounded-full mb-4 font-black uppercase flex items-center gap-2">
                <i class="fas fa-fingerprint"></i> Nhấn giữ ảnh dưới để lưu
            </div>
            
            <div class="w-full aspect-square bg-slate-50 rounded-2xl overflow-hidden mb-6 shadow-inner border border-slate-100">
                <img id="result-img" class="w-full h-full object-contain" alt="Kết quả">
            </div>
            
            <div class="grid grid-cols-2 gap-3 w-full">
                <button id="open-new-tab" class="control-btn bg-slate-100 text-slate-700 py-3 rounded-xl font-bold uppercase text-[10px] tracking-widest border border-slate-200">
                    Mở tab mới
                </button>
                <button onclick="document.getElementById('result-modal').classList.remove('active')" class="control-btn bg-indigo-600 text-white py-3 rounded-xl font-bold uppercase text-[10px] tracking-widest shadow-lg shadow-indigo-100">
                    Đóng
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900/90 backdrop-blur-sm text-white px-6 py-3 rounded-full text-[10px] md:text-xs font-bold shadow-2xl transition-all duration-300 translate-y-20 opacity-0 z-[210] text-center min-w-[280px]">
        Thông báo
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const zoomSlider = document.getElementById('zoom-slider');
        const zoomValDisp = document.getElementById('zoom-val');
        const userPhotoInput = document.getElementById('user-photo');
        const downloadBtn = document.getElementById('download-btn');
        const resultModal = document.getElementById('result-modal');
        const resultImg = document.getElementById('result-img');
        const openNewTabBtn = document.getElementById('open-new-tab');

        const FRAME_URL = 'Final-v2.png'; 

        let state = {
            userImg: null,
            frameImg: null,
            posX: 400,
            posY: 400,
            scale: 1,
            isDragging: false,
            lastX: 0,
            lastY: 0,
            initialPinchDistance: 0,
            initialScale: 1
        };

        const frameImg = new Image();
        frameImg.crossOrigin = "anonymous";
        frameImg.onload = () => {
            updateCanvasSize(frameImg);
            state.frameImg = frameImg;
            render();
        };
        frameImg.onerror = () => showToast("Lỗi: Không tải được khung ảnh!");
        frameImg.src = FRAME_URL;

        function updateCanvasSize(img) {
            const baseSize = 1200;
            const ratio = img.width / img.height;
            canvas.width = ratio >= 1 ? baseSize : baseSize * ratio;
            canvas.height = ratio >= 1 ? baseSize / ratio : baseSize;
            state.posX = canvas.width / 2;
            state.posY = canvas.height / 2;
        }

        userPhotoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    state.userImg = img;
                    const scaleNeeded = Math.max(canvas.width / img.width, canvas.height / img.height);
                    updateScale(scaleNeeded);
                    state.posX = canvas.width / 2;
                    state.posY = canvas.height / 2;
                    render();
                    showToast("Đã tải ảnh lên thành công ✨");
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function updateScale(val) {
            state.scale = parseFloat(val);
            zoomSlider.value = val;
            zoomValDisp.innerText = Math.round(state.scale * 100) + "%";
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (state.userImg) {
                const drawW = state.userImg.width * state.scale;
                const drawH = state.userImg.height * state.scale;
                ctx.drawImage(state.userImg, state.posX - drawW / 2, state.posY - drawH / 2, drawW, drawH);
            } else {
                ctx.fillStyle = "#f1f5f9";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#cbd5e1";
                ctx.textAlign = "center";
                ctx.font = "bold 44px Inter";
                ctx.fillText("CHƯA CHỌN ẢNH", canvas.width/2, canvas.height/2);
            }

            if (state.frameImg) {
                ctx.drawImage(state.frameImg, 0, 0, canvas.width, canvas.height);
            }
        }

        zoomSlider.addEventListener('input', (e) => {
            updateScale(e.target.value);
            render();
        });

        function getDistance(touches) {
            return Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        const handleStart = (e) => {
            if (e.touches && e.touches.length === 2) {
                state.isDragging = false;
                state.initialPinchDistance = getDistance(e.touches);
                state.initialScale = state.scale;
            } else {
                state.isDragging = true;
                const pos = getMousePos(e);
                state.lastX = pos.x; state.lastY = pos.y;
            }
        };

        const handleMove = (e) => {
            if (!state.userImg) return;
            
            // Chỉ chặn cuộn màn hình khi đang thao tác thực sự (kéo hoặc zoom)
            if (e.touches && e.touches.length === 2) {
                e.preventDefault(); 
                const currentDist = getDistance(e.touches);
                if (state.initialPinchDistance > 0) {
                    const ratio = currentDist / state.initialPinchDistance;
                    let newScale = state.initialScale * ratio;
                    newScale = Math.min(Math.max(newScale, 0.05), 3);
                    updateScale(newScale);
                    render();
                }
            } else if (state.isDragging) {
                e.preventDefault();
                const pos = getMousePos(e);
                state.posX += (pos.x - state.lastX);
                state.posY += (pos.y - state.lastY);
                state.lastX = pos.x; state.lastY = pos.y;
                render();
            }
        };

        const handleEnd = () => {
            state.isDragging = false;
            state.initialPinchDistance = 0;
        };

        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        
        // Thêm listener vào canvas để xử lý touch chính xác hơn
        canvas.addEventListener('touchstart', handleStart, {passive: false});
        canvas.addEventListener('touchmove', handleMove, {passive: false});
        canvas.addEventListener('touchend', handleEnd);

        const step = 25;
        document.getElementById('move-up').onclick = () => { state.posY -= step; render(); };
        document.getElementById('move-down').onclick = () => { state.posY += step; render(); };
        document.getElementById('move-left').onclick = () => { state.posX -= step; render(); };
        document.getElementById('move-right').onclick = () => { state.posX += step; render(); };
        document.getElementById('reset-pos').onclick = () => { state.posX = canvas.width/2; state.posY = canvas.height/2; render(); };

        downloadBtn.onclick = () => {
            if (!state.userImg) return showToast("Vui lòng chọn ảnh trước!");
            
            try {
                showToast("Đang tạo ảnh chất lượng cao...");
                const dataUrl = canvas.toDataURL("image/png", 1.0);
                
                resultImg.src = dataUrl;
                resultModal.classList.add('active');

                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = 'Avatar_HBT_40nam.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                openNewTabBtn.onclick = () => {
                    const win = window.open();
                    win.document.write('<img src="' + dataUrl  + '" style="width:100%;">');
                };

            } catch (err) {
                console.error(err);
                showToast("Lỗi hệ thống khi xuất ảnh.");
            }
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.transform = "translate(-50%, -20px)";
            toast.style.opacity = "1";
            setTimeout(() => { 
                toast.style.transform = "translate(-50%, 80px)"; 
                toast.style.opacity = "0"; 
            }, 3000);
        }

        window.onload = render;
    </script>
</body>
</html>
